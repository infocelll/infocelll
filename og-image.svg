<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1f3d"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#142c52"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#4dd9f5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd9f5;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="900" cy="150" r="300" fill="url(#glow)" opacity="0.5"/>
  <circle cx="200" cy="500" r="200" fill="url(#glow)" opacity="0.3"/>
  <circle cx="1050" cy="500" r="150" fill="url(#glow)" opacity="0.4"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#4dd9f5" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Phone icon -->
  <g transform="translate(850, 180)">
    <rect x="0" y="0" width="120" height="220" rx="20" fill="none" stroke="#4dd9f5" stroke-width="3" opacity="0.6"/>
    <rect x="10" y="25" width="100" height="170" rx="4" fill="#1e3a5f" opacity="0.5"/>
    <circle cx="60" cy="210" r="6" fill="none" stroke="#4dd9f5" stroke-width="2" opacity="0.6"/>
    <rect x="40" y="8" width="40" height="4" rx="2" fill="#4dd9f5" opacity="0.4"/>
    <!-- Wrench icon inside phone -->
    <g transform="translate(30, 70) scale(1.8)" opacity="0.7">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" fill="none" stroke="#4dd9f5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Accent line -->
  <rect x="80" y="390" width="200" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Company name -->
  <text x="80" y="200" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72" fill="#ffffff" letter-spacing="-1">INFOCELLL</text>
  
  <!-- Tagline -->
  <text x="80" y="270" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="28" fill="#4dd9f5" letter-spacing="2">ASSISTÊNCIA TÉCNICA</text>
  
  <!-- Subtitle -->
  <text x="80" y="330" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="22" fill="#8896a8">Conserto de Celulares · Informática · Peças</text>
  
  <!-- Location -->
  <text x="80" y="440" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="18" fill="#5a6d85">
    <tspan fill="#4dd9f5">📍</tspan>  Olinda-PE  ·  (81) 98733-2162  ·  infocelll.com.br
  </text>
  
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1e3a5f" opacity="0.5"/>
  <text x="600" y="615" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#4dd9f5" text-anchor="middle" letter-spacing="3">GARANTIA DE 90 DIAS · PEÇAS ORIGINAIS · ORÇAMENTO GRÁTIS</text>
</svg>